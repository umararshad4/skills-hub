name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure git (needed by red-team probes)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
      - name: Run full toolkit check (unit tests + red-team + strict audit)
        run: bash scripts/check.sh
