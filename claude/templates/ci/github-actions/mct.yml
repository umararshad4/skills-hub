name: MCT Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  mct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: hashFiles('package.json') != ''
        with:
          node-version: 22

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        if: hashFiles('pnpm-lock.yaml') != ''
        with:
          version: latest

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile; else npm ci; fi

      - name: Run MCT pre-push checks
        run: |
          python3 .github/mct/mct verify --mode ci

      - name: Run MCT strict audit
        run: |
          python3 .github/mct/mct audit --strict
          python3 .github/mct/mct final-check --todo-log
